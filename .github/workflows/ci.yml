name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: offline   # no API keys needed — the suite runs the offline provider
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Byte-compile
        run: python -m compileall backend api

      - name: Run tests
        run: pytest -q
